name: Publish to NuGet

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: nuget-publish
    permissions:
      id-token: write  # required for OIDC trusted publishing
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test
        run: dotnet test --no-build --configuration Release --verbosity normal

      - name: Pack core
        run: dotnet pack src/FluentMigrator.IdempotentExtensions/FluentMigrator.IdempotentExtensions.csproj --no-build --configuration Release --output nupkg

      - name: Pack SqlServer
        run: dotnet pack src/FluentMigrator.IdempotentExtensions.SqlServer/FluentMigrator.IdempotentExtensions.SqlServer.csproj --no-build --configuration Release --output nupkg

      - name: NuGet login via OIDC
        uses: NuGet/login@v1
        id: nuget-login
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Push to NuGet
        run: dotnet nuget push nupkg/*.nupkg --api-key ${{ steps.nuget-login.outputs.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
