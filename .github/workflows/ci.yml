name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test
        run: dotnet test tests/FluentMigrator.IdempotentExtensions.Tests --no-build --configuration Release --verbosity normal

  integration-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Restore
        run: dotnet restore tests/FluentMigrator.IdempotentExtensions.Tests.Integration

      - name: Test against real SQL Server / PostgreSQL / MySQL (Testcontainers)
        run: dotnet test tests/FluentMigrator.IdempotentExtensions.Tests.Integration --configuration Release --verbosity normal
